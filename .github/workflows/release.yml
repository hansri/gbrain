name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  postgres-schema-authority:
    # A tag cannot build or publish until the same two-Postgres + PgBouncer
    # authority gate used on pull requests has passed for the tagged commit.
    uses: ./.github/workflows/postgres-schema-authority.yml

  quality:
    name: Release quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 90
    services:
      postgres:
        image: pgvector/pgvector@sha256:1d533553fefe4f12e5d80c7b80622ba0c382abb5758856f52983d8789179f0fb  # pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gbrain_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --pids-limit 256
          --memory 1g
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
      - name: Require tagged commit to be reachable from master
        run: |
          git fetch --no-tags origin master
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/master; then
            echo "Refusing release: tagged commit is not reachable from origin/master." >&2
            exit 1
          fi
      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun audit
      - run: bun run verify
      - run: bun run test
      - run: bun run test:slow
      - name: Run the complete guarded Postgres E2E suite
        # A release must not rely on a separate workflow's status or a short
        # hand-picked subset: every E2E file is reset into the disposable
        # gbrain_test authority and runs sequentially with the same fail-closed
        # wrapper used by local CI.
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gbrain_test
          GBRAIN_TEST_DB: '1'
        run: bash scripts/run-e2e.sh

  build:
    needs: [quality, postgres-schema-authority]
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: gbrain-darwin-arm64
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: gbrain-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun build --compile --target=${{ matrix.target }} --outfile bin/${{ matrix.artifact }} src/cli.ts
      - name: Validate compiled binary
        run: |
          case "${{ matrix.target }}" in
            bun-linux-x64)
              file bin/${{ matrix.artifact }} | grep -Eq 'ELF 64-bit.*x86-64'
              bin/${{ matrix.artifact }} --version
              ;;
            bun-darwin-arm64)
              file bin/${{ matrix.artifact }} | grep -Eq 'Mach-O 64-bit.*arm64'
              if [ "$(uname -m)" = arm64 ]; then
                bin/${{ matrix.artifact }} --version
              fi
              ;;
            *) exit 1 ;;
          esac
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: ${{ matrix.artifact }}
          path: bin/${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: 1.3.13
      - name: Enforce fail-closed release channel policy
        id: release_policy
        run: bun scripts/check-release-channel-policy.ts "$GITHUB_REF_NAME"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: artifacts
      - name: Generate release checksums
        run: |
          cd artifacts
          sha256sum \
            gbrain-darwin-arm64/gbrain-darwin-arm64 \
            gbrain-linux-x64/gbrain-linux-x64 \
            | sed 's#  [^/]*/#  #' \
            > SHA256SUMS
      - name: Create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2
        with:
          files: |
            artifacts/gbrain-darwin-arm64/gbrain-darwin-arm64
            artifacts/gbrain-linux-x64/gbrain-linux-x64
            artifacts/SHA256SUMS
          generate_release_notes: true
          prerelease: ${{ steps.release_policy.outputs.prerelease }}
          make_latest: ${{ steps.release_policy.outputs.make_latest }}
